<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>i3 Medical</title>
<link rel="icon" type="image/png" sizes="48x48" href="./favicon.png">
<meta http-equiv="refresh" content="16;url=https://www.lumicare.one/">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --magenta: #d946a8;
    --cyan: #5b8dde;
    --white: #f0f0f5;
    --bg-dark: #08080f;
  }

  html { height: -webkit-fill-available; }

  body {
    background: var(--bg-dark);
    /* Safari fallback first, then modern small viewport height to avoid toolbar overlap. */
    min-height: 100vh;
    min-height: -webkit-fill-available;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    color: var(--white);
    overflow: hidden;
    position: relative;
  }

  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    -webkit-filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow--magenta {
    width: 520px; height: 520px;
    background: var(--magenta);
    top: 18%; left: 12%;
    opacity: 0.06;
    animation: glowPulse 7s ease-in-out infinite;
  }
  .glow--cyan {
    width: 440px; height: 440px;
    background: var(--cyan);
    bottom: 14%; right: 12%;
    opacity: 0.05;
    animation: glowPulse 7s ease-in-out infinite 3.5s;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.04; transform: scale(1); }
    50% { opacity: 0.08; transform: scale(1.15); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: max(2rem, env(safe-area-inset-top)) max(2rem, env(safe-area-inset-right)) max(2rem, env(safe-area-inset-bottom)) max(2rem, env(safe-area-inset-left));
    max-width: 760px;
    width: 100%;
  }

  /* Logo lockup */
  .logo-lockup {
    margin-bottom: 2.75rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo-main {
    width: 64vw;
    min-width: 260px;
    max-width: 460px;
    width: clamp(260px, 64vw, 460px);
    opacity: 0;
    transform: translateY(14px) scale(0.98);
    filter: blur(6px);
    -webkit-filter: blur(6px);
    transition: opacity 1.2s ease, transform 1.2s ease, filter 1.2s ease, -webkit-filter 1.2s ease;
  }
  .logo-main.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
    -webkit-filter: blur(0);
  }

  /* Subtext sits at 63.6% the width of the main logo to match the original lockup */
  .logo-sub-wrap {
    width: 64vw;
    min-width: 260px;
    max-width: 460px;
    width: clamp(260px, 64vw, 460px);
    display: flex;
    justify-content: flex-end;   /* right-aligned to logo edge */
    margin-top: 0.75rem;
  }
  .logo-sub {
    width: 63.24%;
    /* start hidden, revealed left-to-right */
    clip-path: inset(0 100% 0 0);
    -webkit-clip-path: inset(0 100% 0 0);
    opacity: 0;
    transition: clip-path 1.6s cubic-bezier(0.22, 1, 0.36, 1),
                -webkit-clip-path 1.6s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.6s ease;
  }
  .logo-sub.revealed {
    clip-path: inset(0 0 0 0);
    -webkit-clip-path: inset(0 0 0 0);
    opacity: 1;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--magenta), transparent);
    margin: 0 auto 1.8rem;
    opacity: 0;
    transition: opacity 0.8s ease, width 0.8s ease;
  }
  .divider.visible { opacity: 0.5; width: 90px; }

  .message {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.8s ease, transform 0.8s ease;
    margin-bottom: 2.4rem;
  }
  .message.visible { opacity: 1; transform: translateY(0); }
  .message h2 {
    font-weight: 300;
    font-size: clamp(1rem, 3vw, 1.35rem);
    color: rgba(240, 240, 245, 0.72);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }
  .message h2 strong { font-weight: 700; color: var(--white); }

  .countdown-area {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .countdown-area.visible { opacity: 1; transform: translateY(0); }

  .countdown-ring {
    width: 90px; height: 90px;
    margin: 0 auto 1rem;
    position: relative;
  }
  .countdown-ring svg { transform: rotate(-90deg); width: 90px; height: 90px; }
  .countdown-ring .track {
    fill: none; stroke: rgba(240,240,245,0.06); stroke-width: 3;
  }
  .countdown-ring .progress {
    fill: none; stroke: var(--magenta); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 251.2; stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 2s ease;
  }
  .countdown-number {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 1.6rem; color: var(--white);
  }
  .redirect-label {
    font-size: 0.8rem; font-weight: 300;
    color: rgba(240,240,245,0.35);
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .skip-link {
    display: inline-block; margin-top: 2rem;
    font-size: 0.85rem; color: rgba(240,240,245,0.4);
    text-decoration: none; letter-spacing: 0.05em;
    transition: color 0.3s ease;
    border-bottom: 1px solid rgba(240,240,245,0.1); padding-bottom: 2px;
  }
  .skip-link:hover { color: var(--white); border-bottom-color: var(--white); }

  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    opacity: 0; animation: drift 8s ease-in-out infinite;
  }
  @keyframes drift {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    20% { opacity: 0.4; } 80% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100px) translateX(30px); }
  }


  /* Keep the full-screen animated background stable on phone-sized WebKit viewports. */
  @media (max-width: 600px) {
    .glow {
      filter: blur(72px);
      -webkit-filter: blur(72px);
    }
    .glow--magenta { width: 340px; height: 340px; top: 14%; left: -10%; }
    .glow--cyan { width: 300px; height: 300px; bottom: 10%; right: -10%; }
  }

  @media (prefers-reduced-motion: reduce) {
    .glow, .particle { animation: none; }
    .logo-main, .logo-sub, .divider, .message, .countdown-area { transition-duration: 0.01ms; }
  }
</style>
</head>

<script>
  (function(){
    var c=document.getElementById('particles');
    var colors=['#d946a8','#5b8dde','#f0f0f5'];
    for(var i=0;i<20;i++){
      var p=document.createElement('div');p.className='particle';
      p.style.left=Math.random()*100+'%';
      p.style.top=(40+Math.random()*60)+'%';
      p.style.background=colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDelay=(Math.random()*8)+'s';
      p.style.animationDuration=(6+Math.random()*4)+'s';
      c.appendChild(p);
    }
  })();

  var main=document.getElementById('logo-main');
  var sub=document.getElementById('logo-sub');
  var divider=document.getElementById('divider');
  var message=document.getElementById('message');
  var countdownArea=document.getElementById('countdown-area');
  var countdownNumber=document.getElementById('countdown-number');
  var progress=document.getElementById('progress');
  var C=2*Math.PI*40;
  progress.style.strokeDasharray=C; progress.style.strokeDashoffset='0';

  // 0.4s: main logo eases in
  setTimeout(function(){ main.classList.add('visible'); }, 400);
  // 1.8s: unveil "A Lumicare company"
  setTimeout(function(){ sub.classList.add('revealed'); }, 1800);
  // 3.8s: divider + message
  setTimeout(function(){ divider.classList.add('visible'); message.classList.add('visible'); }, 3800);
  // 5s: countdown
  setTimeout(function(){
    countdownArea.classList.add('visible');
    var n=10;
    var t=setInterval(function(){
      n--; countdownNumber.textContent=n;
      progress.style.strokeDashoffset=C*(1-n/10);
      if(n<=3) progress.style.stroke='#f0f0f5';
      if(n<=0){ clearInterval(t); window.location.replace('https://www.lumicare.one/'); }
    },1000);
  }, 5000);
</script>
