<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i3medical is now Lumicare</title>
<meta http-equiv="refresh" content="16;url=https://lumicare.one/">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@200;300;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --magenta: #d946a8;
    --cyan: #5b8dde;
    --white: #f0f0f5;
    --bg-dark: #08080f;
  }

  body {
    background: var(--bg-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    color: var(--white);
    overflow: hidden;
    position: relative;
  }

  /* Ambient glows */
  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow--magenta {
    width: 500px; height: 500px;
    background: var(--magenta);
    top: 20%; left: 15%;
    opacity: 0.06;
    animation: glowPulse 6s ease-in-out infinite;
  }
  .glow--cyan {
    width: 400px; height: 400px;
    background: var(--cyan);
    bottom: 15%; right: 15%;
    opacity: 0.05;
    animation: glowPulse 6s ease-in-out infinite 3s;
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.04; transform: scale(1); }
    50% { opacity: 0.08; transform: scale(1.15); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  /* Logo stage — holds both logos stacked */
  .logo-stage {
    position: relative;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2.5rem;
  }

  /* i3medical text logo */
  .logo-i3 {
    font-family: 'Sora', sans-serif;
    font-weight: 200;
    font-size: clamp(2.8rem, 7vw, 5rem);
    letter-spacing: 0.02em;
    line-height: 1.1;
    opacity: 1;
    transition: opacity 1s ease, transform 1s ease, filter 1s ease;
  }
  .logo-i3 .i3 { color: var(--magenta); }
  .logo-i3 .med { color: var(--cyan); }
  .logo-i3.fade-out {
    opacity: 0;
    transform: scale(0.92);
    filter: blur(8px);
  }

  .tagline {
    font-weight: 300;
    font-size: clamp(0.7rem, 2vw, 0.95rem);
    color: var(--magenta);
    letter-spacing: 0.25em;
    margin-top: 0.5rem;
    opacity: 1;
    transition: opacity 0.6s ease;
  }
  .tagline.hidden { opacity: 0; }

  /* Lumicare actual logo */
  .logo-lumicare {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1.05);
    width: clamp(220px, 50vw, 420px);
    opacity: 0;
    filter: blur(8px);
    transition: opacity 1.2s ease 0.3s, transform 1.2s ease 0.3s, filter 1.2s ease 0.3s;
    pointer-events: none;
  }
  .logo-lumicare.visible {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
    filter: blur(0);
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--magenta), transparent);
    margin: 0 auto 2rem;
    opacity: 0;
    transition: opacity 0.8s ease 0.2s, width 0.8s ease 0.2s;
  }
  .divider.visible {
    opacity: 0.5;
    width: 80px;
  }

  /* Message */
  .message {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
    margin-bottom: 2.5rem;
  }
  .message.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .message h2 {
    font-weight: 300;
    font-size: clamp(1rem, 3vw, 1.35rem);
    color: rgba(240, 240, 245, 0.7);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }
  .message h2 strong {
    font-weight: 700;
    color: var(--white);
  }

  /* Countdown */
  .countdown-area {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
  }
  .countdown-area.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .countdown-ring {
    width: 90px;
    height: 90px;
    margin: 0 auto 1rem;
    position: relative;
  }
  .countdown-ring svg {
    transform: rotate(-90deg);
    width: 90px;
    height: 90px;
  }
  .countdown-ring .track {
    fill: none;
    stroke: rgba(240, 240, 245, 0.06);
    stroke-width: 3;
  }
  .countdown-ring .progress {
    fill: none;
    stroke: var(--magenta);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 251.2;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 2s ease;
  }
  .countdown-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--white);
    letter-spacing: -0.02em;
  }

  .redirect-label {
    font-size: 0.8rem;
    font-weight: 300;
    color: rgba(240, 240, 245, 0.35);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .skip-link {
    display: inline-block;
    margin-top: 2rem;
    font-size: 0.85rem;
    color: rgba(240, 240, 245, 0.4);
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.3s ease;
    border-bottom: 1px solid rgba(240, 240, 245, 0.1);
    padding-bottom: 2px;
  }
  .skip-link:hover {
    color: var(--white);
    border-bottom-color: var(--white);
  }

  /* Particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    opacity: 0;
    animation: drift 8s ease-in-out infinite;
  }
  @keyframes drift {
    0% { opacity: 0; transform: translateY(0) translateX(0); }
    20% { opacity: 0.4; }
    80% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-100px) translateX(30px); }
  }
</style>
</head>

  </div>

  <div class="countdown-area" id="countdown-area">
    <div class="countdown-ring">
      <svg viewBox="0 0 90 90">
        <circle class="track" cx="45" cy="45" r="40"/>
        <circle class="progress" id="progress" cx="45" cy="45" r="40"/>
      </svg>
      <div class="countdown-number" id="countdown-number">10</div>

<script>
  // Particles
  (function() {
    var c = document.getElementById('particles');
    var colors = ['#d946a8', '#5b8dde', '#f0f0f5'];
    for (var i = 0; i < 20; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = (40 + Math.random() * 60) + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDelay = (Math.random() * 8) + 's';
      p.style.animationDuration = (6 + Math.random() * 4) + 's';
      c.appendChild(p);
    }
  })();

  var logoI3 = document.getElementById('logo-i3');
  var tagline = document.getElementById('tagline');
  var logoLumicare = document.getElementById('logo-lumicare');
  var divider = document.getElementById('divider');
  var message = document.getElementById('message');
  var countdownArea = document.getElementById('countdown-area');
  var countdownNumber = document.getElementById('countdown-number');
  var progress = document.getElementById('progress');

  var CIRCUMFERENCE = 2 * Math.PI * 40;
  progress.style.strokeDasharray = CIRCUMFERENCE;
  progress.style.strokeDashoffset = '0';

  // Step 1 @ 2s: fade out i3medical, fade in Lumicare logo
  setTimeout(function() {
    tagline.classList.add('hidden');
    logoI3.classList.add('fade-out');
    logoLumicare.classList.add('visible');
  }, 2000);

  // Step 2 @ 3.8s: show message
  setTimeout(function() {
    divider.classList.add('visible');
    message.classList.add('visible');
  }, 3800);

  // Step 3 @ 5s: start countdown
  setTimeout(function() {
    countdownArea.classList.add('visible');
    var count = 10;
    var interval = setInterval(function() {
      count--;
      countdownNumber.textContent = count;
      var offset = CIRCUMFERENCE * (1 - count / 10);
      progress.style.strokeDashoffset = offset;
      if (count <= 3) {
        progress.style.stroke = '#f0f0f5';
      }
      if (count <= 0) {
        clearInterval(interval);
        window.location.href = 'https://lumicare.one/';
      }
    }, 1000);
  }, 5000);
</script>
